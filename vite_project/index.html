<body>
<script type="module" src="./src/widget.ts"></script>

<script type="module">
    export const registry = {
        megamenu: {
            cdn: '/cdn/default.json'
        }
    };

    import { mount } from './src/widget.ts';
    import {loadContractByName} from './src/widget-runtime/lib/contractLoader.ts';

    const el = document.querySelector('megamenu-widget');

    const config = await loadContractByName('megamenu', registry);

    mount(el, config);
</script>
<megamenu-widget data-instance="main-nav">
    <div class="widget-spinner"></div>
</megamenu-widget>
</body>
